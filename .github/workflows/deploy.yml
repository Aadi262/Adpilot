name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e

            echo "=== AdPilot Deploy $(date) ==="
            cd /root/Adpilot

            # Pull latest code
            git pull origin main

            # Install backend dependencies
            npm ci --omit=dev

            # Build React frontend
            cd client
            npm ci
            npm run build
            cd ..

            # Regenerate Prisma client (schema may have changed)
            npx prisma generate

            # Restart or start the PM2 process
            if pm2 describe adpilot > /dev/null 2>&1; then
              pm2 reload adpilot --update-env
            else
              pm2 start ecosystem.config.js --env production
            fi

            # Save PM2 process list so it survives reboots
            pm2 save

            # Quick health check
            sleep 3
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Health check passed (HTTP $STATUS)"
            else
              echo "✗ Health check FAILED (HTTP $STATUS)"
              pm2 logs adpilot --lines 20 --nostream
              exit 1
            fi

            echo "=== Deploy complete ==="
